<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, initial-scale=1.0" />
    <title>Server Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              wall: '#BEA18D',
              bezel: '#151515',
              screen: '#0A0A0A',
              furniture: '#ECE7E1',
              drawer: '#D4CDC5',
              'frame-outer': '#FFFFFF',
              'frame-inner': '#222222',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
            },
            boxShadow: {
              'depth': '10px 15px 30px rgba(0,0,0,0.2)',
              'inner-depth': 'inset 2px 2px 5px rgba(0,0,0,0.3)',
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #1a1a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: auto;
        margin: 0;
      }
      #root {
        width: 1920px;
        height: 920px;
        flex-shrink: 0;
        transform-origin: center center;
      }
      /* Custom Scrollbar for Terminal */
      .terminal-scroll::-webkit-scrollbar {
        width: 8px;
      }
      .terminal-scroll::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      .terminal-scroll::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

</body>
</html>
